local function get_network_interface()
    local file = io.open("/proc/net/dev", "r")
    if not file then return "lo" end
    local content = file:read("*all")
    file:close()
    local wifi_iface    = nil
    local eth_iface     = nil
    for line in content:gmatch("[^\r\n]+") do
        local iface = line:match("^%s*([^:]+):")
        if iface and iface ~= "lo" then
            local sf = io.open("/sys/class/net/" .. iface .. "/operstate", "r")
            local is_up = false
            if sf then
                local st = sf:read("*line")
                sf:close()
                is_up = (st == "up" or st == "unknown")
            end
            if is_up then
                if iface:match("^w") then
                    wifi_iface = wifi_iface or iface
                elseif iface:match("^e") and
                       not iface:match("^tun") and
                       not iface:match("^tap") and
                       not iface:match("^veth") and
                       not iface:match("^br") then
                    eth_iface = eth_iface or iface
                end
            end
        end
    end
    return wifi_iface or eth_iface or "lo"
end
local function setup_templates()
    local config_file_path = os.getenv("HOME") .. "/.config/conky/Mimod/scripts/config"
    local file = io.open(config_file_path, "r")
    if file then
        local content = file:read("*all")
        file:close()
        local net_match = content:match('NET_INTERFACE=["\']?([^"\'\n]*)["\']?')
        if net_match and net_match ~= "" then return net_match end
    end
    return get_network_interface()
end
local final_iface = setup_templates()
local function read_config_colors()
    local path = os.getenv("HOME") .. "/.config/conky/Mimod/scripts/config"
    local file = io.open(path, "r")
    local c = ""
    if file then
        c = file:read("*all") or ""
        file:close()
    end
    local function get(key, default)
        local val = c:match(key .. [=[=["']?#?(%x%x%x%x%x%x)]=])
        return val and ("#" .. val) or ("#" .. default)
    end
    return
        get("COLOR_TEXT",      "eeeeee"),
        get("COLOR_ACCENT",    "268BA0"),
        get("COLOR_SECONDARY", "999999"),
        get("COLOR_QUOTE",     "A9E2C2"),
        get("COLOR_ARTIST",    "e0e077"),
        get("COLOR_PLAYER",    "eeeeee")
end
local c_text, c_accent, c_secondary, c_quote, c_artist, c_player = read_config_colors()
