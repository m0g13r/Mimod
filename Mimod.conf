local function get_network_interface()
local f=io.open("/proc/net/dev","r")
if not f then return "lo" end
local w,e
for line in f:lines() do
local i=line:match("^%s*([^%s:]+):")
if i and i~="lo" then
local sf=io.open("/sys/class/net/"..i.."/operstate","r")
if sf then
local s=sf:read("*l")
sf:close()
if s=="up" or s=="unknown" then
if i:sub(1,1)=="w" then w=w or i else e=e or i end
end
end
end
end
f:close()
return w or e or "lo"
end
local function setup_templates()
local p=(os.getenv("HOME") or "/home/"..(os.getenv("USER") or "user")).."/.config/conky/Mimod/scripts/config"
local f=io.open(p,"r")
if not f then return get_network_interface(),"" end
local c=f:read("*a")
f:close()
local m=c:match('NET_INTERFACE=["\']?([^"\'\n]+)["\']?')
return (m and m~="") and m or get_network_interface(),c
end
local iface,cfg_content=setup_templates()
local function get_c(k,d)
local v=cfg_content:match(k..'=["\']?#?(%x%x%x%x%x%x)["\']?')
return v and ("#"..v) or ("#"..d)
end
