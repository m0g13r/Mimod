local function get_network_interface()
    local file = io.open("/proc/net/dev", "r")
    if not file then return "lo" end
    local content = file:read("*all")
    file:close()
    local wifi_interface = nil
    local other_interfaces = {}
    for line in content:gmatch("[^\r\n]+") do
        local iface = line:match("^%s*([^:]+):")
        if iface and iface ~= "lo" then
            local state_file = io.open("/sys/class/net/" .. iface .. "/operstate", "r")
            local is_up = false
            if state_file then
                local state = state_file:read("*line")
                state_file:close()
                if state == "up" or state == "unknown" then is_up = true end
            end
            if is_up then
                if iface:match('^w') then
                    wifi_interface = iface
                -- ^e covers ^en and ^eth; exclusions guard against veth/br/tun/tap
                elseif iface:match('^e') and not (iface:match('^tun') or iface:match('^tap') or iface:match('^veth') or iface:match('^br')) then
                    table.insert(other_interfaces, iface)
                end
            end
        end
    end
    if wifi_interface then return wifi_interface end
    if #other_interfaces >= 1 then return other_interfaces[1] end
    return "lo"
end
local function setup_templates()
    local network_interface = nil
    local config_file_path = os.getenv("HOME") .. "/.config/conky/Mimod/scripts/config"
    local file = io.open(config_file_path, "r")
    if file then
        local content = file:read("*all")
        file:close()
        local net_match = content:match('NET_INTERFACE=["\']?([^"\'\n]*)["\']?')
        if net_match then network_interface = net_match end
    end
    local auto_iface = get_network_interface()
    return (network_interface and network_interface ~= "") and network_interface or auto_iface
end
local final_iface = setup_templates()
local function read_config_color(key, default)
    local file = io.open(os.getenv("HOME") .. "/.config/conky/Mimod/scripts/config", "r")
    if not file then return "#" .. default end
    local c = file:read("*all")
    file:close()
    local val = c:match(key .. [[=["']?#?(%x%x%x%x%x%x)]])
    return val and ("#" .. val) or ("#" .. default)
end
